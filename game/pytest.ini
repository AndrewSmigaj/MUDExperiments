[pytest]
# Pure sim/ unit tests run from the game dir so `import world.sim.*` resolves,
# with NO Django/Evennia setup (functional-core boundary). Integration tests
# live under tests/integration and run via `evennia test` (make test-int), not here.
pythonpath = .
testpaths = tests/sim
python_files = test_*.py
# -p no:django keeps pytest-django dormant so the pure suite never configures
# Django/Evennia even if DJANGO_SETTINGS_MODULE is set in the container env.
addopts = -q -p no:django
